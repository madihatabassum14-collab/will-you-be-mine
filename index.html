<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Ammi & Abbu ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  width: 350px;
  position: relative;
}

h1, h2 {
  color: #ff4d6d;
}

button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #e63950;
}

#noBtn {
  position: absolute;
}

.hidden {
  display: none;
}

#typing {
  min-height: 140px;
  white-space: pre-line;
  color: #333;
}

/* floating hearts */
.heart {
  position: absolute;
  color: #ff4d6d;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh); opacity: 1;}
  100% {transform: translateY(-10vh); opacity: 0;}
}
</style>
</head>

<body>

<div class="container">
  <h1>For My Ammi & Abbu ❤️</h1>

  <p id="startText">I have something from my heart… 🥺</p>

  <button onclick="start()">Click Me ❤️</button>

  <div id="content" class="hidden">
    <div id="typing"></div>

    <h2>Will you always be my strength and my forever home? 🥺❤️</h2>

    <button onclick="yesClicked()">Always ❤️</button>
    <button id="noBtn" onmouseover="moveNo()">Never 😅</button>
  </div>
</div>

<!-- background music -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=romantic-background-112191.mp3" type="audio/mpeg">
</audio>

<script>
const message = `My dearest Ammi & Abbu ❤️

You are my first love,
my first home, and my forever strength 🫶

Every smile of mine begins because of you…
every happiness I feel comes from your love 💖

Ammi, your care is my comfort 🥺
Abbu, your support is my strength ❤️

You both are my safe place,
my peace, my sukoon 🌙

I may not always say it,
but today I want you to know…

I love you more than words can ever explain 💕

May Allah bless you with
health, happiness, and long life 🤲✨

I promise to always make you proud
and always stay by your side 💖`;

let i = 0;

function typeEffect() {
  if (i < message.length) {
    document.getElementById("typing").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeEffect, 40);
  }
}

function start() {
  document.getElementById("content").classList.remove("hidden");
  document.getElementById("startText").style.display = "none";
  document.querySelector("button").style.display = "none";

  // play music
  document.getElementById("music").play();

  typeEffect();
}

function yesClicked() {
  document.body.innerHTML = `
    <h1 style="color:white;">❤️ I LOVE YOU AMMI & ABBU ❤️</h1>
    <h2 style="color:white;">Forever grateful 🥺💖</h2>
  `;

  // confetti
  for (let i = 0; i < 150; i++) {
    let c = document.createElement("div");
    c.style.position = "absolute";
    c.style.width = "8px";
    c.style.height = "8px";
    c.style.backgroundColor = randomColor();
    c.style.top = "-10px";
    c.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(c);

    let fall = setInterval(() => {
      c.style.top = parseFloat(c.style.top) + 5 + "px";
    }, 20);

    setTimeout(() => {
      clearInterval(fall);
      c.remove();
    }, 3000);
  }
}

function randomColor() {
  const colors = ["#ff4d6d", "#fbc2eb", "#a6c1ee", "#ffffff", "#ffcc00"];
  return colors[Math.floor(Math.random() * colors.length)];
}

function moveNo() {
  let btn = document.getElementById("noBtn");
  btn.style.left = Math.random() * 250 + "px";
  btn.style.top = Math.random() * 250 + "px";
}

// floating hearts
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
</html>
